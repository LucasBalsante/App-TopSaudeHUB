services:
  db:
    image: postgres:17
    container_name: DB_TOPSAUDEHUB
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: appdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: topsaudehub_backend:latest
    container_name: BACKEND_TOPSAUDEHUB
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Container"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=appdb;Username=admin;Password=123456"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: topsaudehub_frontend:latest
    container_name: FRONTEND_TOPSAUDEHUB
    restart: always
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  pgdata: