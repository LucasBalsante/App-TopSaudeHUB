services:
  db:
    image: postgres:17
    container_name: DB_TOPSAUDEHUB
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: topsaudehub_backend:latest
    container_name: BACKEND_TOPSAUDEHUB
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Container"
      ConnectionStrings__DefaultConnection: "${BACKEND_CONNECTION_STRING_CONTAINER}"
      ASPNETCORE_URLS: "http://+:${BACKEND_CONTAINER_PORT}"
    ports:
      - "${BACKEND_PORT}:${BACKEND_CONTAINER_PORT}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: topsaudehub_frontend:latest
    container_name: FRONTEND_TOPSAUDEHUB
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  pgdata: