<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <div class="feedback-content" [class.feedback-error]="data.tone === 'error'">
    <mat-icon class="feedback-icon">{{ iconName }}</mat-icon>
    <p class="feedback-message">{{ data.message }}</p>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-flat-button type="button" [mat-dialog-close]="true">
    {{ data.closeLabel ?? 'Fechar' }}
  </button>
</mat-dialog-actions>
